      <aside class="checkout-right">
        <div class="order-summary sticky">
          <h3>Order summary</h3>
          <p class="summary-label" id="itemCount">Items in cart: 0</p>
          <div id="checkoutItems" class="summary-items"></div>
          <div class="summary-divider"></div>
          <div class="total">Total: $<span id="checkoutTotal">0.00</span></div>
        </div>
      </aside>
    </div>

  <aside id="cart" class="cart" aria-hidden="true">
    <div class="cart-head">
      <h3>Your cart</h3>
      <button id="closeCart" aria-label="Close cart">✕</button>
    </div>
    <div id="cartItems" class="cart-items"></div>
    <div class="cart-footer">
      <div class="total">Total: $<span id="cartTotal">0.00</span></div>
      <button id="checkout" class="btn btn-primary">Checkout</button>
    </div>
  </aside>
